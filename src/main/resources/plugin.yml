name: SoulFix
version: '${version}'
main: bm.b0b0b0.SoulFix.SoulFix
api-version: '1.21'
authors: [ b0b0b0 ]
softdepend: [ PlaceholderAPI, PlayerPoints, Vault ]
commands:
  soulfix:
    description: SoulFix repair menu
    usage: /soulfix [slots|admin]
  repair:
    description: Open SoulFix repair menu
    usage: /repair
permissions:
  soulfix.use:
    description: Open repair menu
    default: true
  soulfix.admin:
    description: Admin commands
    default: op
  soulfix.bypass.cooldown:
    description: Bypass repair cooldown
    default: op
  soulfix.slots.vip:
    description: Unlock row 28-34 (cumulative, after base row 37-43)
    default: false
  soulfix.slots.premium:
    description: Unlock row 19-25 (cumulative)
    default: false
  soulfix.slots.mvp:
    description: Unlock row 10-16 (cumulative)
    default: false
libraries:
  - net.elytrium:serializer:1.1.1
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.46.1.3
  - com.mysql:mysql-connector-j:8.4.0
